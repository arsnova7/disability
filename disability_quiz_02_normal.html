<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>장애인복지론 퀴즈 [2강 - 중급]</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
    :root { --primary: #5c6ac4; --bg-gray: #f4f6f8; --success: #28a745; --danger: #dc3545; }
    body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
    .container { width: 100%; max-width: 700px; }
    .header { text-align: center; margin-bottom: 20px; }
    .quiz-box { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .option-btn { width: 100%; text-align: left; padding: 15px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 10px; background: white; cursor: pointer; font-size: 1rem; transition: 0.2s; }
    .option-btn:hover { background: #f0f4ff; border-color: var(--primary); }
    .option-btn.correct { background: #e6fffa; border-color: var(--success); color: var(--success); font-weight: bold; }
    .option-btn.wrong { background: #fff5f5; border-color: var(--danger); color: var(--danger); }
    .btn-next { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 20px; display: none; }
    .hint-box, .exp-box { padding: 15px; border-radius: 10px; margin-top: 15px; display: none; line-height: 1.6; }
    .hint-box { background: #fffaf0; border: 1px solid #fbd38d; }
    .exp-box { background: #e6fffa; border: 1px solid #b2f5ea; }
    .result-card { background: white; border-radius: 20px; padding: 40px; text-align: center; display: none; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .score-num { font-size: 3rem; font-weight: 800; color: var(--primary); margin: 20px 0; }
    .wrong-list { text-align: left; background: #f8fafc; padding: 15px; border-radius: 10px; margin: 20px 0; font-size: 0.9rem; }
</style>
</head>
<body>
<div class="container">
    <div id="quiz-screen">
        <div class="header">
            <h1 id="lecture-title">제2강: 장애 이해하기 2 (중급)</h1>
            <p id="progress-text">1 / 15</p>
        </div>
        <div class="quiz-box">
            <div id="question-text" style="font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; word-break: keep-all;"></div>
            <div id="options-container"></div>
            <div id="hint-box" class="hint-box">💡 <b>힌트:</b> <span id="hint-text"></span></div>
            <div id="exp-box" class="exp-box">✅ <b>해설:</b> <span id="exp-text"></span></div>
            <button id="next-btn" class="btn-next" onclick="nextQuestion()">다음 문제로</button>
        </div>
    </div>

    <div id="result-screen" class="result-card">
        <h2>🎊 학습을 마쳤습니다!</h2>
        <div class="score-num"><span id="correct-count">0</span> / <span id="total-count">0</span></div>
        <p id="result-msg"></p>
        <div id="wrong-area" style="display:none;">
            <p style="font-weight:bold; color:var(--danger);">❌ 틀린 문제 번호:</p>
            <div class="wrong-list" id="wrong-numbers"></div>
        </div>
        <button class="option-btn" style="background:var(--primary); color:white; text-align:center;" onclick="location.reload()">🔄 처음부터 다시 풀기</button>
        <button class="option-btn" style="text-align:center;" onclick="location.href='index.html'">🏠 목록으로 돌아가기</button>
    </div>
</div>

<script>
    // 
    const quizData = [
        {"level": "중", "q": "[워크북] 장애인으로 공식 인정받기 위해 필요한 절차는?",
    "o": ["의료보험 자동 가입", "지자체 임의 선정", "의료기록 전산 제출", "장애인 등록 신청 및 심사"],
    "a": 3,
    "h": "행정기관을 통한 공식적인 과정이 필수적입니다.",
    "e": "장애인복지 서비스는 '장애인등록제'를 통해 이루어지며, 본인 신청과 의료적 진단, 공단의 심사를 거쳐야 합니다."
  },
  {
    "level": "중",
    "q": "[워크북] 장애등급제가 폐지된 주요 이유로 적절한 것은?",
    "o": ["급수 세분화의 필요성", "의학적 손상 정도만 반영", "모든 장애인 서비스 통일", "장애 유형 구분의 폐지"],
    "a": 1,
    "h": "장애인의 개별적 생활 욕구를 반영하지 못했습니다.",
    "e": "장애등급제는 개인의 사회적 욕구를 반영하지 않고 전적으로 의학적 손상 기준에만 기반하여 차별을 유발한다는 비판을 받았습니다."
  },
  {
    "level": "중",
    "q": "[워크북] 2019년 장애등급제 폐지 이후 도입된 서비스 방식은?",
    "o": ["장애특성 분류 시스템", "소득기반 자격제도", "장애인 서비스 종합조사", "의료진 중심 심사평가"],
    "a": 2,
    "h": "일상생활과 인지행동 특성을 종합적으로 평가합니다.",
    "e": "장애등급제 폐지 후, 욕구 기반으로 서비스를 배분하기 위해 '장애인 서비스 지원 종합조사' 제도가 도입되었습니다."
  },
  {
    "level": "중",
    "q": "[워크북] 장애인 실태조사가 가지는 주요 정책적 의미는?",
    "o": ["삶의 조건 파악 정책 근거", "장애 발생 원인 단일화", "의료기록 진단체계 표준화", "장애 범주 축소 관리"],
    "a": 0,
    "h": "현실을 수치화하여 정책 개선의 기초 자료로 삼습니다.",
    "e": "실태조사는 소득, 건강, 교육 등 장애인의 현실을 파악하여 관련 복지 정책 수립과 예산 편성의 필수 근거 자료가 됩니다."
  },
  {
    "level": "중",
    "q": "[워크북] 우리나라 장애인의 삶과 관련된 설명으로 옳은 것은?",
    "o": ["조사로 모든 삶 파악 가능", "실태조사는 2000년대 시작", "돌봄은 전문 인력이 전담", "원인은 주로 후천적 사고/질환"],
    "a": 3,
    "h": "선천적 원인보다 살아가면서 겪는 원인이 훨씬 큽니다.",
    "e": "장애인의 88%가 후천적 질환이나 사고로 장애를 갖게 됩니다. 양적 조사로 개인의 모든 삶을 파악하기는 어렵습니다."
  },
  {
    "level": "중",
    "q": "[교재] 장애등급제가 장애인에게 미친 부정적 행정 역할은?",
    "o": ["소극적 수동적 이용자 한정", "자립생활 모델의 확산", "권리형 자원봉사 촉진", "개별 맞춤형 서비스 제공"],
    "a": 0,
    "h": "정해진 등급에 따라 수동적으로 대우받게 만들었습니다.",
    "e": "장애인은 자신의 욕구를 알릴 필요 없이 부여된 등급에 따른 서비스만 받아야 하는 소극적 이용자로 전락했습니다."
  },
  {
    "level": "중",
    "q": "[교재] 장애인등록제를 시행하여 정부가 갖는 주된 장점은?",
    "o": ["국제적 인권 기준 충족", "정책 대상 파악의 편의성", "질병의 완치율 상승", "장애인 고용의 직접 창출"],
    "a": 1,
    "h": "대상자의 범위를 정확히 가늠하여 행정 관리가 쉽습니다.",
    "e": "등록제를 통해 정부는 정책 대상자의 수를 정확히 파악하고 예산과 제도를 추진하는 데 있어 행정적 편의성을 확보합니다."
  },
  {
    "level": "중",
    "q": "[교재] 우리나라 장애인 출현율이 낮은 가장 근본적인 이유는?",
    "o": ["장애 발생 예방의 성공", "의료 진단 중심 엄격 판정", "포괄적 자가신고 방식 채택", "장애인 복지 예산의 풍부함"],
    "a": 1,
    "h": "스웨덴과 같이 필요에 따른 평가가 아니라 기준이 엄격합니다.",
    "e": "포괄적인 자가보고가 아닌, 신체 기능 중심의 엄격한 의료적 심사 절차에 의존하기 때문에 통계상 출현율이 낮습니다."
  },
  {
    "level": "중",
    "q": "[교재] 장애인의 집 밖 활동을 제약하는 가장 큰 요인은?",
    "o": ["장애인 관련 편의시설 부족", "외출 동반자 부재", "의사소통의 어려움", "주위 사람들의 시선"],
    "a": 0,
    "h": "사회적 모델에서 비판하는 물리적 장벽입니다.",
    "e": "집 밖 활동 제약 요인 중 '장애인 관련 편의시설 부족'이 52.3%로 가장 높아, 구조적 환경 요인의 문제를 보여줍니다."
  },
  {
    "level": "중",
    "q": "[교재] 장애인 가구의 추가 소요비용 중 가장 큰 항목은?",
    "o": ["보호 간병비", "의료비", "교통비", "장애 관련 식비"],
    "a": 1,
    "h": "만성 질환 등 정기적 진료 필요성과 연관됩니다.",
    "e": "전체적으로 월평균 추가비용 중 의료비(57.8천 원)가 가장 높은 비중을 차지합니다."
  },
  {
    "level": "중",
    "q": "[교재] 장애 학생이 학교생활에서 주로 경험하는 차별의 주체는?",
    "o": ["교직원 및 교사", "학교 행정 담당자", "또래 학생", "지역사회 주민"],
    "a": 2,
    "h": "통합교육 환경 내에서 직접 부딪히는 대상입니다.",
    "e": "학교생활 중 겪는 사회적 차별 경험 비율을 보면 '또래 학생으로부터의 차별 경험'이 53.3%로 매우 높게 나타납니다."
  },
  {
    "level": "중",
    "q": "[교재] 장애등급제 폐지 후 장애 정도를 구분하는 기준은?",
    "o": ["1급에서 3급으로 축소", "심한 장애와 심하지 않은 장애", "신체적 장애와 정신적 장애", "영구 장애와 한시적 장애"],
    "a": 1,
    "h": "숫자로 된 등급 대신 적용된 이분법적 분류입니다.",
    "e": "종전 1~6급 체계가 폐지되고, '장애의 정도가 심한 장애인'과 '심하지 않은 장애인'으로 단순화되었습니다."
  },
  {
    "level": "중",
    "q": "[2025년 기말 후기] 실태조사로 본 장애인의 경제적 특성은?",
    "o": ["가구 소득이 전국 평균 상회", "기초수급 비율이 전국 평균 이하", "가구 소득이 전국 평균의 63%", "취업자 비율이 60% 상회"],
    "a": 2,
    "h": "취업의 어려움 등으로 경제적 빈곤 비율이 높습니다.",
    "e": "장애인 가구 월평균 소득은 전국 가구 소득의 63.3% 수준으로, 경제적 어려움에 처해 있는 경우가 많습니다."
  },
  {
    "level": "중",
    "q": "[2024년 기말 후기] 발달장애에 포함되는 장애 유형의 묶음은?",
    "o": ["뇌병변장애와 정신장애", "지적장애와 정신장애", "지적장애와 자폐성장애", "언어장애와 자폐성장애"],
    "a": 2,
    "h": "언론에서 흔히 혼용하여 사용하는 두 가지 장애입니다.",
    "e": "발달장애인법에 따라 발달장애는 지적장애인과 자폐성장애인을 포괄하는 개념으로 규정됩니다."
  },
  {
    "level": "중",
    "q": "[강의녹음] 종합조사표 도입 후 제기되는 장애계의 비판은?",
    "o": ["서비스 제공 시간이 과도함", "장애 유형 무관한 동일 항목 조사", "소득 기준의 지나친 강조", "민간 서비스의 전면 배제"],
    "a": 1,
    "h": "시각장애인과 지체장애인을 똑같은 기준으로 평가합니다.",
    "e": "신체기능 제한에 초점을 맞추어 장애 유형과 상관없이 옷 갈아입기 등 모두 동일한 항목으로 평가하는 한계가 지적됩니다."}
    ];

    let curIdx = 0;
    let score = 0;
    let wrongIndices = [];
    let isAnswered = false;

    function loadQuestion() {
        isAnswered = false;
        wrongCount = 0;
        const q = quizData[curIdx];
        document.getElementById('progress-text').innerText = `${curIdx + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = `Q${curIdx + 1}. ${q.q}`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.o.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, btn);
            container.appendChild(btn);
        });

        document.getElementById('hint-box').style.display = 'none';
        document.getElementById('exp-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    let wrongCount = 0;

    function checkAnswer(idx, btn) {
        if (isAnswered) return;

        const q = quizData[curIdx];
        const allBtns = document.querySelectorAll('.option-btn');

        if (idx === q.a) {
            isAnswered = true;
            btn.classList.add('correct');
            allBtns.forEach(b => b.style.pointerEvents = 'none');
            score++;
            document.getElementById('exp-text').innerText = q.e;
            document.getElementById('exp-box').style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
        } else {
            wrongCount++;
            btn.classList.add('wrong');
            btn.style.pointerEvents = 'none';

            if (wrongCount === 1) {
                document.getElementById('hint-text').innerText = q.h;
                document.getElementById('hint-box').style.display = 'block';
            } else {
                isAnswered = true;
                allBtns[q.a].classList.add('correct');
                allBtns.forEach(b => b.style.pointerEvents = 'none');
                wrongIndices.push(curIdx + 1);
                document.getElementById('exp-text').innerText = q.e;
                document.getElementById('exp-box').style.display = 'block';
                document.getElementById('next-btn').style.display = 'block';
            }
        }
    }

    function nextQuestion() {
        curIdx++;
        if (curIdx < quizData.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('correct-count').innerText = score;
        document.getElementById('total-count').innerText = quizData.length;
        
        if (wrongIndices.length > 0) {
            document.getElementById('wrong-area').style.display = 'block';
            document.getElementById('wrong-numbers').innerText = wrongIndices.join(', ') + " 번 문제를 다시 확인해 보세요.";
            document.getElementById('result-msg').innerText = "조금만 더 힘내볼까요? 틀린 부분을 복습해 보세요! 💪";
        } else {
            document.getElementById('result-msg').innerText = "와우! 완벽합니다. 장학금이 눈앞에 보이네요! 🍗";
        }
    }

    loadQuestion();
</script>
</body>
</html>
