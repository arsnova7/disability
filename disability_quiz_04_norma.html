<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>장애인복지론 퀴즈 [4강 - 중급]</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
    :root { --primary: #5c6ac4; --bg-gray: #f4f6f8; --success: #28a745; --danger: #dc3545; }
    body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
    .container { width: 100%; max-width: 700px; }
    .header { text-align: center; margin-bottom: 20px; }
    .quiz-box { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .option-btn { width: 100%; text-align: left; padding: 15px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 10px; background: white; cursor: pointer; font-size: 1rem; transition: 0.2s; }
    .option-btn:hover { background: #f0f4ff; border-color: var(--primary); }
    .option-btn.correct { background: #e6fffa; border-color: var(--success); color: var(--success); font-weight: bold; }
    .option-btn.wrong { background: #fff5f5; border-color: var(--danger); color: var(--danger); }
    .btn-next { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 20px; display: none; }
    .hint-box, .exp-box { padding: 15px; border-radius: 10px; margin-top: 15px; display: none; line-height: 1.6; }
    .hint-box { background: #fffaf0; border: 1px solid #fbd38d; }
    .exp-box { background: #e6fffa; border: 1px solid #b2f5ea; }
    .result-card { background: white; border-radius: 20px; padding: 40px; text-align: center; display: none; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .score-num { font-size: 3rem; font-weight: 800; color: var(--primary); margin: 20px 0; }
    .wrong-list { text-align: left; background: #f8fafc; padding: 15px; border-radius: 10px; margin: 20px 0; font-size: 0.9rem; }
</style>
</head>
<body>
<div class="container">
    <div id="quiz-screen">
        <div class="header">
            <h1 id="lecture-title">제4강: 현대 장애인복지 역사와 법 (중급)</h1>
            <p id="progress-text">1 / 15</p>
        </div>
        <div class="quiz-box">
            <div id="question-text" style="font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; word-break: keep-all;"></div>
            <div id="options-container"></div>
            <div id="hint-box" class="hint-box">💡 <b>힌트:</b> <span id="hint-text"></span></div>
            <div id="exp-box" class="exp-box">✅ <b>해설:</b> <span id="exp-text"></span></div>
            <button id="next-btn" class="btn-next" onclick="nextQuestion()">다음 문제로</button>
        </div>
    </div>

    <div id="result-screen" class="result-card">
        <h2>🎊 학습을 마쳤습니다!</h2>
        <div class="score-num"><span id="correct-count">0</span> / <span id="total-count">0</span></div>
        <p id="result-msg"></p>
        <div id="wrong-area" style="display:none;">
            <p style="font-weight:bold; color:var(--danger);">❌ 틀린 문제 번호:</p>
            <div class="wrong-list" id="wrong-numbers"></div>
        </div>
        <button class="option-btn" style="background:var(--primary); color:white; text-align:center;" onclick="location.reload()">🔄 처음부터 다시 풀기</button>
        <button class="option-btn" style="text-align:center;" onclick="location.href='index.html'">🏠 목록으로 돌아가기</button>
    </div>
</div>

<script>
    // 
    const quizData = [
        {"level": "중", "q": "[워크북] 1970년대 서구 장애인복지 패러다임 변화의 핵심적 배경은?",
    "o": ["의료적 재활의 고도화", "자립생활과 정상화 확산", "시설 수용 정책의 강화", "자선 단체의 활동 주도"],
    "a": 1,
    "h": "비장애인과 동일한 생활과 당사자 중심 통제권의 부상입니다.",
    "e": "1970년대에는 대규모 시설 수용을 비판하는 북유럽의 정상화 운동과 미국의 자립생활 운동이 확산되며 사회통합 지향으로 패러다임이 변했습니다."
  },
  {
    "level": "중",
    "q": "[교재] 1981년 UN이 선포하여 각국의 정책 발전을 강력히 촉발한 것은?",
    "o": ["장애인차별금지 조약", "세계 장애인의 해", "세계인권선언", "밀레니엄 개발 목표"],
    "a": 1,
    "h": "이 해를 기점으로 우리나라의 심신장애자복지법도 제정되었습니다.",
    "e": "UN은 1981년을 '세계 장애인의 해'로 지정하고 이후 10년을 선포하여 각국이 장애인 정책을 입법하고 정비하도록 강력히 권고했습니다."
  },
  {
    "level": "중",
    "q": "[교재] 1990년 제정되어 세계 차별금지법 입법의 표본이 된 미국 법률은?",
    "o": ["장애인고용촉진법", "자립생활지원법", "미국 장애인법(ADA)", "재활법(Rehabilitation Act)"],
    "a": 2,
    "h": "물리적 환경, 고용, 통신 등 전 영역의 장벽 철폐를 다룹니다.",
    "e": "1990년에 제정된 미국의 장애인법(ADA)은 사회적, 물리적 환경의 포괄적 차별 금지를 명문화하여 호주, 영국, 한국 등의 입법에 큰 영향을 주었습니다."
  },
  {
    "level": "중",
    "q": "[강의녹음] 우리나라 사회복지법령에서 '할 수 있다' 규정이 초래하는 문제는?",
    "o": ["지나친 예산의 낭비 유발", "법적 실효성과 강제성 저하", "민간 자본의 과도한 개입", "전문가 집단의 권한 축소"],
    "a": 1,
    "h": "선택적 재량이 주어지면 정부가 예산 핑계로 이행하지 않습니다.",
    "e": "'할 수 있다'는 임의규정으로, 정부나 지자체가 예산 부족 등을 이유로 제도를 실행하지 않아도 법적 제재를 받지 않아 실효성을 떨어뜨립니다."
  },
  {
    "level": "중",
    "q": "[교재] 1961년 제정되어 빈곤 장애인에 대한 국가 보호의 근거가 된 법률은?",
    "o": ["생활보호법", "사회보장기본법", "국민기초생활보장법", "의료급여법"],
    "a": 0,
    "h": "빈곤 문제 해결의 일환으로 장애인을 근로무능력자에 포함했습니다.",
    "e": "1961년 제정된 「생활보호법」은 18세 미만, 65세 이상과 함께 장애로 인한 근로무능력자를 보호 대상에 포함하여 국가 개입의 시초가 되었습니다."
  },
  {
    "level": "중",
    "q": "[교재] 1970년대 특수교육진흥법이 지닌 장애인 정책상의 역사적 의의는?",
    "o": ["통합교육의 법적 의무화", "장애 수당의 전면적 지급", "입학 거부 금지를 통한 차별금지", "모든 대학의 장애인 할당제"],
    "a": 2,
    "h": "학교에서 장애를 이유로 불이익을 주지 못하게 명시했습니다.",
    "e": "특수교육진흥법은 각급 학교장이 장애를 이유로 입학을 거부하지 못하게 명시함으로써 우리나라 정책에 차별금지 원리를 최초로 도입했습니다."
  },
  {
    "level": "중",
    "q": "[교재] 2007년 장애인차별금지법 제정 과정에서 가장 주도적이었던 주체는?",
    "o": ["정부 관료와 행정가", "의료 재활 전문의", "장애인 당사자와 단체", "기업의 사회공헌 부서"],
    "a": 2,
    "h": "법을 요구하며 거리에서 오랜 기간 투쟁한 사람들입니다.",
    "e": "장애인차별금지법은 정부 주도가 아니라, 법 제정의 필요성을 체감한 장애인 당사자와 시민단체들이 연대하여 수년간 투쟁해 이뤄낸 성과입니다."
  },
  {
    "level": "중",
    "q": "[2024년 기말 후기] 발달장애인의 권리보장과 맞춤형 지원을 위해 2014년 제정된 법은?",
    "o": ["장애아동 복지지원법", "발달장애인 권리보장 지원법", "한국수화언어법", "특수교육진흥법"],
    "a": 1,
    "h": "지적장애인과 자폐성장애인의 생애주기별 특성을 반영했습니다.",
    "e": "2014년에 제정된 「발달장애인 권리보장 및 지원에 관한 법률」은 발달장애인의 의사 존중과 생애주기별 맞춤형 지원체계를 명문화했습니다."
  },
  {
    "level": "중",
    "q": "[교재] 장애인복지법상 2019년 장애등급제 폐지와 함께 도입된 제도는?",
    "o": ["장애인 의무고용 심사", "장애인 서비스 종합조사", "보편적 무상 의료지원", "절대적 기본소득 보장"],
    "a": 1,
    "h": "의학적 등급 대신 개인의 필요를 파악하는 도구입니다.",
    "e": "기존의 1~6급 의학적 장애등급제가 단계적으로 폐지되면서, 장애인의 환경과 필요를 평가하여 서비스를 배분하는 종합적 욕구조사가 도입되었습니다."
  },
  {
    "level": "중",
    "q": "[교재] 2025년 세계장애정상회의(GDS)가 전 세계 정책으로 가장 강조한 핵심은?",
    "o": ["장애 포용(Inclusion)", "분리 보호 시설 확충", "의료적 완치의 최우선", "가족의 사적 돌봄 책임"],
    "a": 0,
    "h": "다양한 구성원이 장벽 없이 어우러지는 사회를 지향합니다.",
    "e": "2025년 독일 세계장애정상회의는 장애 포용(Inclusion)을 가속화하기 위해 제도를 CRPD와 조화시키고 포용성을 정책 전반에 주류화할 것을 권고했습니다."
  },
  {
    "level": "중",
    "q": "[교재] 2016년 제정되어 농인의 언어를 국어와 동등한 자격으로 인정한 법은?",
    "o": ["점자법", "언어발달지원법", "한국수화언어법", "특수교육법"],
    "a": 2,
    "h": "손으로 대화하는 방식을 고유한 언어 체계로 격상했습니다.",
    "e": "「한국수화언어법」은 수어가 단순한 보조 수단이 아니라 국어와 동등한 자격을 가진 농인의 고유한 언어임을 명확히 밝혔습니다."
  },
  {
    "level": "중",
    "q": "[2018년 기출] 「장애인차별금지 및 권리구제 등에 관한 법률」의 설명으로 옳지 않은 것은?",
    "o": ["2007년에 제정되었다", "간접차별은 차별이 아니다", "패러다임의 변화가 반영됨", "인권위가 시정기구 역할을 함"],
    "a": 1,
    "h": "의도하지 않았더라도 결과적으로 불리하면 차별로 봅니다.",
    "e": "장애인차별금지법은 형식상 공정한 기준이라도 장애인에게 불리한 결과를 초래하는 '간접차별' 역시 명백한 차별 행위로 금지하고 있습니다."
  },
  {
    "level": "중",
    "q": "[2019년 기출] 2018년 제5차 장애인정책종합계획에서 결정된 가장 큰 변화는?",
    "o": ["장애등급제의 단계적 폐지", "특수학교의 전면적 폐쇄", "최저임금 적용제외 전면 무효", "장애인등록제의 완전 폐지"],
    "a": 0,
    "h": "개인별 맞춤형 서비스를 제공하기 위한 제도적 결단입니다.",
    "e": "정부는 2018년 제5차 종합계획에서 획일적인 의학적 기준에 얽매인 장애등급제를 폐지하고 욕구 기반 종합지원체계로 전환할 것을 결정했습니다."
  },
  {
    "level": "중",
    "q": "[강의녹음] 2000년대 이후 중증장애인 중심의 당사자 운동이 이뤄낸 성과가 아닌 것은?",
    "o": ["활동지원제도의 도입", "거주시설 탈시설화 요구", "장애등급제의 전면 폐지", "장애인 의무고용제 최초 제정"],
    "a": 3,
    "h": "이 제도는 1990년에 이미 제정되었습니다.",
    "e": "장애인 의무고용제(장애인고용촉진법)는 1990년에 제정되었으며, 2000년대 중증장애인 운동의 핵심 성과는 활동지원, 탈시설, 장애등급제 폐지 등입니다."
  },
  {
    "level": "중",
    "q": "[교재] 제정 논의 중인 「장애인권리보장법(안)」의 핵심적인 제정 취지는?",
    "o": ["복지 수급 기준의 대폭 강화", "시혜 대상에서 권리 주체로 선언", "개별 법률의 통폐합 전면 취소", "의료적 재활 서비스 예산 삭감"],
    "a": 1,
    "h": "대상화된 존재에서 헌법적 기본권을 지닌 주체로의 전환입니다.",
    "e": "「장애인권리보장법(안)」은 장애인을 시혜적 복지의 대상이 아니라 자기결정권과 사회참여권을 지닌 온전한 권리의 주체로 명확히 선언하려는 법입니다."}
    ];

    let curIdx = 0;
    let score = 0;
    let wrongIndices = [];
    let isAnswered = false;

    function loadQuestion() {
        isAnswered = false;
        wrongCount = 0;
        const q = quizData[curIdx];
        document.getElementById('progress-text').innerText = `${curIdx + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = `Q${curIdx + 1}. ${q.q}`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.o.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, btn);
            container.appendChild(btn);
        });

        document.getElementById('hint-box').style.display = 'none';
        document.getElementById('exp-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    let wrongCount = 0;

    function checkAnswer(idx, btn) {
        if (isAnswered) return;

        const q = quizData[curIdx];
        const allBtns = document.querySelectorAll('.option-btn');

        if (idx === q.a) {
            isAnswered = true;
            btn.classList.add('correct');
            allBtns.forEach(b => b.style.pointerEvents = 'none');
            score++;
            document.getElementById('exp-text').innerText = q.e;
            document.getElementById('exp-box').style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
        } else {
            wrongCount++;
            btn.classList.add('wrong');
            btn.style.pointerEvents = 'none';

            if (wrongCount === 1) {
                document.getElementById('hint-text').innerText = q.h;
                document.getElementById('hint-box').style.display = 'block';
            } else {
                isAnswered = true;
                allBtns[q.a].classList.add('correct');
                allBtns.forEach(b => b.style.pointerEvents = 'none');
                wrongIndices.push(curIdx + 1);
                document.getElementById('exp-text').innerText = q.e;
                document.getElementById('exp-box').style.display = 'block';
                document.getElementById('next-btn').style.display = 'block';
            }
        }
    }

    function nextQuestion() {
        curIdx++;
        if (curIdx < quizData.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('correct-count').innerText = score;
        document.getElementById('total-count').innerText = quizData.length;
        
        if (wrongIndices.length > 0) {
            document.getElementById('wrong-area').style.display = 'block';
            document.getElementById('wrong-numbers').innerText = wrongIndices.join(', ') + " 번 문제를 다시 확인해 보세요.";
            document.getElementById('result-msg').innerText = "조금만 더 힘내볼까요? 틀린 부분을 복습해 보세요! 💪";
        } else {
            document.getElementById('result-msg').innerText = "와우! 완벽합니다. 장학금이 눈앞에 보이네요! 🍗";
        }
    }
