<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1강 - 장애인복지론 플래시카드</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Pretendard', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; display: flex; flex-direction: column; }
        
        /* 1. 컨테이너 너비를 850px로 넓혀서 글자가 옆으로 퍼지게 했습니다 */
        .container { max-width: 850px; margin: auto; flex: 1; display: flex; flex-direction: column; }
        
        .header { text-align: center; color: white; margin-bottom: 30px; }
        
        /* 2. 카드 높이를 400px로 키우고, 단어 단위 정렬(keep-all)을 추가했습니다 */
        .card { 
            background: white; 
            border-radius: 20px; 
            padding: 40px 30px; 
            margin: 20px 0; 
            min-height: 300px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            cursor: pointer; 
            font-size: 1.25rem; 
            font-weight: bold; 
            word-break: keep-all; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); 
            transition: transform 0.6s; 
            transform-style: preserve-3d; 
            position: relative; 
        }
        
        .card.flipped { transform: rotateY(180deg); }
        .side { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 30px; border-radius: 20px; overflow-y: auto; }
        .back { transform: rotateY(180deg); background: #f8f9fa; color: #5c6ac4; }
        .controls { display: flex; justify-content: space-between; gap: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; background: white; color: #764ba2; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #eee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>제1강 플래시카드</h1>
            <p><span id="current">1</span> / <span id="total">50</span></p>
        </div>
        <div class="card" id="flashcard" onclick="this.classList.toggle('flipped')">
            <div class="side front" id="question">질문 로딩 중...</div>
            <div class="side back" id="answer">정답 로딩 중...</div>
        </div>
        <p style="text-align:center; color:white; font-size:0.95rem; margin-bottom:10px;">👆 카드를 클릭하면 정답이 나와요!</p>
        <div class="controls">
            <button class="btn" onclick="prevCard()">이전</button>
            <button class="btn" onclick="nextCard()">다음</button>
            <button class="btn" onclick="location.href='index.html'">목록으로</button>
        </div>
    </div>

    <script>
        // 주석(//)을 제거하여 데이터를 정상적으로 읽게 수정했습니다.
        const cards = [
            {"q":  "★★★ 장애는 의학적으로만 진단되는 고정적 개념이다. [워크북]", "a": "X (장애는 사회적 환경과 태도에 의해 구성되는 사회적 구성물임)"},
  {"q": "★★★ ICF는 개인과 환경 간의 상호작용을 반영한 다차원적 모델이다. [워크북]", "a": "O"},
  {"q": "★★★ 의료적 모델은 장애를 사회가 만든 것으로 본다. [워크북]", "a": "X (의료적 모델은 개인의 생물학적 결함으로 봄)"},
  {"q": "★★★ 장애학은 장애를 개인적 문제가 아닌 사회적 문제로 본다. [워크북]", "a": "O"},
  {"q": "★★★ 자본주의는 생산성 기준에 맞지 않는 장애인을 배제한다. [워크북]", "a": "O"},
  {"q": "★★☆ ICIDH는 손상이 기능상실과 사회적 불이익을 초래하는 일차원적 모델이다. [교재]", "a": "O"},
  {"q": "★★☆ 사회적 모델은 손상 자체를 장애의 근본 원인으로 파악한다. [교재]", "a": "X (원인은 사회적 억압과 물리적 장벽임)"},
  {"q": "★★☆ UN 장애인권리협약은 장애를 고정 불변의 개념으로 규정한다. [교재]", "a": "X (점진적으로 변화하는 개념으로 정의함)"},
  {"q": "★★☆ 장애인에 대한 온정주의는 비장애인의 우월감에 대한 믿음에서 기인한다. [교재]", "a": "O"},
  {"q": "★★☆ 현대 장애학의 발전은 장애인 운동의 발전과 밀접한 관계가 있다. [교재]", "a": "O"},
  {"q": "★★☆ 사회적 모델은 장애인이 경험하는 개별적 심리 고통을 지나치게 강조한다. [교재]", "a": "X (오히려 환경만 강조하여 심리 고통을 무시한다는 비판을 받음)"},
  {"q": "★☆☆ 북아메리카 토착민은 장애를 단순한 신체의 손상으로 보았다. [교재]", "a": "X (공동체와의 관계 상실로 인식함)"},
  {"q": "★★☆ 의료적 모델은 전문가의 통제 하에 의료적 처치와 개인의 재활을 중시한다. [교재]", "a": "O"},
  {"q": "★★☆ 사회적 모델은 장애를 치료해야 할 질병으로 규정한다. [교재]", "a": "X (사회적 차별과 배제의 결과로 규정함)"},
  {"q": "★★☆ ICF 모델은 상황 요인(환경 요인, 개인 요인)과 건강 상태의 상호작용을 파악한다. [교재]", "a": "O"},
  {"q": "★☆☆ 장애 극복 서사는 장애를 사회적 문제가 아닌 개인의 극복 과제로 전락시킨다. [교재]", "a": "O"},
  {"q": "★★☆ 올리버의 사회적 모델 질문 방식은 문제의 책임을 개인의 질병에서 버스 등 환경으로 전환했다. [교재]", "a": "O"},
  {"q": "★☆☆ 자본주의 이전 농경 사회에서는 장애인이 노동에서 완전히 배제되었다. [교재]", "a": "X (가족과 공동체 내에서 다양한 방식으로 노동에 참여함)"},
  {"q": "★★☆ 손상은 객관적 사실에 속하지만, 장애는 사회적 합의에 따른 구성물이다. [교재]", "a": "O"},
  {"q": "★★☆ 장애학은 장애를 규정하는 정치, 경제, 사회, 문화적 요인을 다학제적으로 탐구한다. [교재]", "a": "O"},
  {"q": "★★★ 2018년 기출에 따르면, ICIDH의 분류 기준에 '참여'는 포함되지 않는다. [기출]", "a": "O"},
  {"q": "★★★ 2018년 기출에 따르면, 사회적 모델은 재활전문가의 역할을 핵심으로 여긴다. [기출]", "a": "X (재활전문가 중시는 의료적 모델임)"},
  {"q": "★★★ 부적절하게 설계된 버스로 인한 곤란함은 장애를 사회적 관점에서 바라본 예시다. [기출]", "a": "O"},
  {"q": "★★★ 2019년 기출에 따르면, IMF는 WHO의 공식 장애 분류기준이다. [기출]", "a": "X (IMF는 무관, ICF나 ICIDH가 맞음)"},
  {"q": "★★★ 장애인과 관련된 호칭으로 '정상인'은 올바른 표현이다. [기출]", "a": "X ('비장애인'이 올바른 표현임)"},
  {"q": "★★★ 사회적 모델은 손상을 가진 사람을 장애화하는 주체가 사회라고 본다. [기출]", "a": "O"},
  {"q": "★★☆ 장애인의 광범위한 시민권을 증진시키기 위한 사회정책을 개발하는 학문은? [교재]", "a": "장애학"},
  {"q": "★☆☆ 장애 극복 이데올로기에서 성공의 척도가 되는 기준은 비장애인의 몸이다. [교재]", "a": "O"},
  {"q": "★☆☆ 헬렌 켈러는 대학 졸업 후 사회 문제에 무관심한 개인적 삶을 살았다. [강의녹음]", "a": "X (사회적 차별에 저항하는 적극적 사회운동가로 활동함)"},
  {"q": "★☆☆ 대중매체의 '극복' 담론은 차별적 사회 구조를 은폐할 위험이 높다. [교재]", "a": "O"},
  {"q": "★☆☆ 자선형 봉사는 장애인의 권리 확보를 위해 연대하고 사회 제도를 개선하는 활동이다. [강의녹음]", "a": "X (이는 권리형 봉사에 대한 설명임)"},
  {"q": "★★☆ 비판적 장애학은 정상성(Normality)의 규정과 그로 인한 억압 체계를 강하게 비판한다. [강의녹음]", "a": "O"},
  {"q": "★★☆ 손상은 비장애인 중심 사회라는 특정한 관계 속에서만 장애가 된다. [강의녹음]", "a": "O"},
  {"q": "★☆☆ 영국 장애학은 1970년대 영국의 장애인 당사자 운동에 뿌리를 두고 있다. [교재]", "a": "O"},
  {"q": "★★☆ 자본주의 사회는 일할 수 있는 자와 없는 자를 구분하며 장애인 범주를 고착화했다. [교재]", "a": "O"},
  {"q": "★☆☆ 온정주의는 장애인을 비장애인과 동등한 주체로 대우하는 철학이다. [교재]", "a": "X (장애인을 어린아이처럼 치환하고 대상화함)"},
  {"q": "★★☆ 현재 장애학은 발달장애인과 정신장애인이 주요 논의에서 소외되었다는 비판을 받는다. [교재]", "a": "O"},
  {"q": "★★☆ 1970년대 미국의 장애 인권 운동은 이전의 흑인 인권 운동 방식에서 큰 교훈을 얻었다. [교재]", "a": "O"},
  {"q": "★★★ 장애를 기능적 제한이나 심리적 상실의 결과로 보는 것은 사회적 모델이다. [기출]", "a": "X (개별적 모델, 즉 의료적 모델의 관점임)"},
  {"q": "★★★ 모든 국가의 장애인 정의와 인정 범주는 문화적 차이 없이 동일하게 적용된다. [기출]", "a": "X (국가의 정치·경제적 상황에 따라 다름)"},
  {"q": "★★☆ 의료적 모델은 장애인의 권리 보장을 위해 사회적 환경 개조를 최우선으로 삼는다. [교재]", "a": "X (환경 개조는 사회적 모델의 핵심 과제임)"},
  {"q": "★★☆ 장애학은 장애인 복지를 시혜적 시책이 아닌 온전한 시민권의 문제로 접근한다. [교재]", "a": "O"},
  {"q": "★★☆ 비판적 장애학에서 말하는 '교차성'은 인종, 성별 등 타 억압 요인과 장애의 결합을 뜻한다. [강의녹음]", "a": "O"},
  {"q": "★☆☆ 시각장애인이 안경 등 보장구로 기능상 제한이 사라진다면 장애가 발생하지 않은 것으로 본다. [교재]", "a": "O"},
  {"q": "★☆☆ 장애인에게 도움을 제공할 때 가장 먼저 해야 할 일은 본인의 의사를 묻는 것이다. [강의녹음]", "a": "O"},
  {"q": "★★☆ ICF(2001) 모델은 환경 요인과 개인 요인을 포괄하여 상황 요인으로 분류한다. [교재]", "a": "O"},
  {"q": "★★☆ 1980년 WHO가 발표한 ICIDH는 장애를 다차원적이고 상호작용적인 관점에서 설명한다. [교재]", "a": "X (선형적이고 일직선적인 인과 모델임)"},
  {"q": "★☆☆ 대중매체가 주로 그리는 장애인은 시혜와 동정, 헌신적 봉사, 극복 서사의 대상이다. [교재]", "a": "O"},
  {"q": "★★★ 장애를 개인에게 국한된 문제로 보고 치료에 집중하는 것은 개별적 모델이다. [기출]", "a": "O"},
  {"q": "★★☆ 결과적 노동차별은 생산성과 효율성만을 중시하는 자본주의의 고유한 특성에서 비롯된다. [2024년 기말 후기]", "a": "O"}
        ];

        let cur = 0;
        const qEl = document.getElementById('question');
        const aEl = document.getElementById('answer');
        const curEl = document.getElementById('current');
        const totEl = document.getElementById('total');

        function updateCard() {
            qEl.textContent = cards[cur].q;
            aEl.textContent = cards[cur].a;
            curEl.textContent = cur + 1;
            totEl.textContent = cards.length;
            document.getElementById('flashcard').classList.remove('flipped');
        }

        function nextCard() { cur = (cur + 1) % cards.length; updateCard(); }
        function prevCard() { cur = (cur - 1 + cards.length) % cards.length; updateCard(); }

        // 초기 실행
        updateCard();
    </script>
</body>
</html>
