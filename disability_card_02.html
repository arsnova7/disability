<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2강 - 장애인복지론 플래시카드</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Pretendard', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; display: flex; flex-direction: column; }
        
        /* 1. 컨테이너 너비를 850px로 넓혀서 글자가 옆으로 퍼지게 했습니다 */
        .container { max-width: 850px; margin: auto; flex: 1; display: flex; flex-direction: column; }
        
        .header { text-align: center; color: white; margin-bottom: 30px; }
        
        /* 2. 카드 높이를 400px로 키우고, 단어 단위 정렬(keep-all)을 추가했습니다 */
        .card { 
            background: white; 
            border-radius: 20px; 
            padding: 40px 30px; 
            margin: 20px 0; 
            min-height: 300px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            cursor: pointer; 
            font-size: 1.25rem; 
            font-weight: bold; 
            word-break: keep-all; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); 
            transition: transform 0.6s; 
            transform-style: preserve-3d; 
            position: relative; 
        }
        
        .card.flipped { transform: rotateY(180deg); }
        .side { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 30px; border-radius: 20px; overflow-y: auto; }
        .back { transform: rotateY(180deg); background: #f8f9fa; color: #5c6ac4; }
        .controls { display: flex; justify-content: space-between; gap: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; background: white; color: #764ba2; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #eee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>제1강 플래시카드</h1>
            <p><span id="current">1</span> / <span id="total">50</span></p>
        </div>
        <div class="card" id="flashcard" onclick="this.classList.toggle('flipped')">
            <div class="side front" id="question">질문 로딩 중...</div>
            <div class="side back" id="answer">정답 로딩 중...</div>
        </div>
        <p style="text-align:center; color:white; font-size:0.95rem; margin-bottom:10px;">👆 카드를 클릭하면 정답이 나와요!</p>
        <div class="controls">
            <button class="btn" onclick="prevCard()">이전</button>
            <button class="btn" onclick="nextCard()">다음</button>
            <button class="btn" onclick="location.href='index.html'">목록으로</button>
        </div>
    </div>

    <script>
        // 주석(//)을 제거하여 데이터를 정상적으로 읽게 수정했습니다.
        const cards = [
            {"q": "★★★ 우리나라에서 장애인으로 인정받으려면 장애인 등록 신청 및 심사 절차를 거쳐야 한다. [워크북]", "a": "O"},
  {"q": "★★★ 장애등급제 폐지의 주요 이유는 의학적 손상 정도만 반영하여 차별을 유발했기 때문이다. [워크북]", "a": "O"},
  {"q": "★★★ 2019년 장애등급제 폐지 이후 새롭게 도입된 제도는 장애인 서비스 지원 종합조사이다. [워크북]", "a": "O"},
  {"q": "★★★ 장애인 실태조사는 장애 발생 원인만을 조사하여 통계화하는 것이 목적이다. [워크북]", "a": "X (장애인의 삶의 조건을 전반적으로 파악해 정책 근거로 씀)"},
  {"q": "★★★ 우리나라 장애인의 장애 원인은 주로 후천적 질환이나 사고이다. [워크북]", "a": "O"},
  {"q": "★★☆ 1989년 장애인복지법 전부 개정과 함께 장애인등록제가 처음 도입되었다. [교재]", "a": "O"},
  {"q": "★★☆ 우리나라 장애인복지법상 규정된 장애 유형은 현재 총 20개이다. [교재]", "a": "X (총 15개 유형임)"},
  {"q": "★★☆ 내부기관의 장애에는 심장, 호흡기, 간, 신장, 장루·요루, 뇌전증장애가 포함된다. [교재]", "a": "O"},
  {"q": "★★☆ 장애인 실태조사에 따르면, 등록 장애인의 과반수가 65세 이상의 고령자이다. [교재]", "a": "O"},
  {"q": "★★☆ 발달장애란 지적장애와 자폐성장애를 포괄하는 명칭이다. [교재]", "a": "O"},
  {"q": "★★☆ 장애등급제는 철저히 장애의 사회적 모델에 기반하여 구축된 제도였다. [교재]", "a": "X (의학적 기준 중심의 의료적 모델에 기반함)"},
  {"q": "★★☆ 종합조사표는 장애 유형에 따른 특수성을 고려하여 각기 다른 평가 항목을 적용한다. [교재]", "a": "X (장애 유형과 상관없이 동일한 항목으로 조사하여 비판받음)"},
  {"q": "★★☆ 장애인의 일상생활 도움 제공자의 80% 이상은 활동지원사 등 전문 인력이다. [교재]", "a": "X (배우자, 부모 등 가족 구성원이 82.1%임)"},
  {"q": "★★☆ 장애인이 집 밖 활동 시 가장 큰 불편함으로 꼽는 것은 장애인 관련 편의시설 부족이다. [교재]", "a": "O"},
  {"q": "★★☆ 장애인 가구의 요구사항 1순위는 일관되게 소득 보장으로 나타난다. [교재]", "a": "O"},
  {"q": "★☆☆ 우리나라의 장애인 출현율은 OECD 평균보다 훨씬 높은 수준이다. [교재]", "a": "X (5.1%로 OECD 평균 26.5%보다 매우 낮음)"},
  {"q": "★☆☆ 장애등급제가 폐지되면서 장애인등록제도 함께 완전히 폐지되었다. [교재]", "a": "X (등급만 폐지되고 등록제는 유지됨)"},
  {"q": "★☆☆ 장애인 가구의 월평균 소득은 전국 가구 소득에 비해 현저히 낮다. [교재]", "a": "O"},
  {"q": "★☆☆ 장애로 인한 추가 비용 중 가장 큰 비중을 차지하는 항목은 교통비이다. [교재]", "a": "X (의료비가 가장 큰 비중을 차지함)"},
  {"q": "★☆☆ 양적조사인 실태조사는 장애인 개개인의 억압적 경험과 맥락을 모두 담아내기 어렵다. [교재]", "a": "O"},
  {"q": "★★★ 2018년 기출에 따르면, 우리나라 장애범주에 '치매'는 포함되지 않는다. [기출]", "a": "O"},
  {"q": "★★★ 2018년 기출에 따르면, 불규칙한 지능발달과 대인관계의 어려움을 지닌 장애는 자폐성장애다. [기출]", "a": "O"},
  {"q": "★★★ 2018년 기출에 따르면, 시각장애인은 모두 기본적으로 점자 해독이 가능하다. [기출]", "a": "X (후천적 요인 등으로 모두 점자를 아는 것은 아님)"},
  {"q": "★★★ 2019년 기출에 따르면, 알코올중독은 장애인복지법상 15개 장애 유형에 속한다. [기출]", "a": "X (속하지 않음)"},
  {"q": "★★★ 2019년 기출에 따르면, 전 세계 모든 국가의 장애인 정의와 범주는 동일하다. [기출]", "a": "X (사회적, 정치적, 제도적 환경에 따라 다름)"},
  {"q": "★★★ 2018년 기출에 따르면, 뇌전증장애는 정신적 장애에 속한다. [기출]", "a": "X (뇌전증장애는 신체적 장애 중 내부기관의 장애에 속함)"},
  {"q": "★★☆ 2003년 장애 범주 2단계 확대 시 추가된 장애에는 안면장애가 포함된다. [교재]", "a": "O"},
  {"q": "★☆☆ 장애등급제 하에서는 '동일 등급=동일 욕구=동일 서비스'라는 획일적 공식이 적용되었다. [교재]", "a": "O"},
  {"q": "★☆☆ 종합조사표는 무엇을 못하는지 기능 제한에 초점을 맞추어 열패감을 유발한다는 비판이 있다. [교재]", "a": "O"},
  {"q": "★☆☆ 스웨덴은 장애인등록제를 통해 철저히 장애인을 구분하여 복지 혜택을 부여한다. [강의녹음]", "a": "X (등록제 없이 보편적 접근 원칙에 따라 필요 중심 지원)"},
  {"q": "★☆☆ 장애인 가구의 지출은 일반 전국 가구 지출의 66.9% 수준이다. [교재]", "a": "O"},
  {"q": "★★☆ 학교생활에서 장애학생이 가장 크게 느끼는 차별은 또래 학생으로부터의 차별이다. [교재]", "a": "O"},
  {"q": "★★☆ 지적장애인과 자폐성장애인의 경우 다른 장애에 비해 보육 및 교육비 추가 비용 지출이 크다. [교재]", "a": "O"},
  {"q": "★☆☆ 영화 <아이 엠 샘>은 비장애인 기준의 정상성 이데올로기가 강요하는 부모 자격을 비판한다. [강의녹음]", "a": "O"},
  {"q": "★★☆ 장애인등록제는 대상자 규모를 파악해 예산을 편성하는 정부의 행정적 편의성을 높인다. [교재]", "a": "O"},
  {"q": "★☆☆ 장애 범주 확대 요구(치매, 틱장애 등)에 정부가 소극적인 가장 큰 이유는 국가 예산 확보 문제다. [강의녹음]", "a": "O"},
  {"q": "★★☆ 장애인 실태조사는 법적 의무 없이 학계의 필요성에 의해 자율적으로 실시된다. [교재]", "a": "X (장애인복지법 제31조에 근거하여 법적으로 시행됨)"},
  {"q": "★★☆ 2019년 7월 이후, 장애등급은 '정도가 심한 장애인'과 '심하지 않은 장애인'으로 단순화되었다. [교재]", "a": "O"},
  {"q": "★★★ 신장장애는 외부 신체기능의 장애에 속한다. [기출]", "a": "X (내부기관의 장애에 속함)"},
  {"q": "★★★ 장애인복지법상 정신적 장애는 발달장애와 정신장애로 구분된다. [기출]", "a": "O"},
  {"q": "★★☆ 장애등급제는 정부의 예산 편성을 어렵고 복잡하게 만들었다는 비판을 받았다. [교재]", "a": "X (오히려 획일적 예산 편성을 쉽게 만들어 통제 수단이 됨)"},
  {"q": "★★☆ 실태조사에 의하면 장애인의 83%는 결혼을 경험한 것으로 나타난다. [교재]", "a": "O"},
  {"q": "★★☆ 대중매체가 장애인을 가시화할 때, 있는 그대로보다는 비장애인 중심의 극복 서사를 요구하는 경향이 있다. [강의녹음]", "a": "O"},
  {"q": "★☆☆ 장애등급제 폐지는 서비스 공급자 중심에서 서비스 이용자(수요자) 중심으로의 철학적 전환을 내포한다. [교재]", "a": "O"},
  {"q": "★☆☆ 신체적 장애 원인 중 후천적 사고가 후천적 질환보다 높은 비율을 차지한다. [교재]", "a": "X (후천적 질환이 58.1%로 사고 29.9%보다 높음)"},
  {"q": "★★☆ 장애인의 취업자 비율은 전체 인구 취업자 비율의 절반 수준에 머물러 있다. [강의녹음]", "a": "O"},
  {"q": "★★☆ 종합조사표의 일상생활동작 항목에는 옷 갈아입기, 목욕하기, 식사하기 등이 포함된다. [교재]", "a": "O"},
  {"q": "★☆☆ 장애인 삶 패널조사는 시간의 경과에 따른 장애인 개인과 가족의 동태적 변화를 추적한다. [교재]", "a": "O"},
  {"q": "★★★ 안면장애는 사회적 제약을 크게 받는 신체적 외부 장애의 대표적 사례다. [기출]", "a": "O"},
  {"q": "★★☆ 장애인의 기초생활보장 수급자 비율은 약 20.8%로 비장애인에 비해 압도적으로 높다. [강의녹음]", "a": "O"}
        ];

        let cur = 0;
        const qEl = document.getElementById('question');
        const aEl = document.getElementById('answer');
        const curEl = document.getElementById('current');
        const totEl = document.getElementById('total');

        function updateCard() {
            qEl.textContent = cards[cur].q;
            aEl.textContent = cards[cur].a;
            curEl.textContent = cur + 1;
            totEl.textContent = cards.length;
            document.getElementById('flashcard').classList.remove('flipped');
        }

        function nextCard() { cur = (cur + 1) % cards.length; updateCard(); }
        function prevCard() { cur = (cur - 1 + cards.length) % cards.length; updateCard(); }

        // 초기 실행
        updateCard();
    </script>
</body>
</html>
